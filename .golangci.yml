version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
    - gosec
    - bodyclose
    - misspell
  settings:
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
  exclusions:
    rules:
      # gosec's path-traversal checks are false-positive-heavy on tests
      # that legitimately read fixtures and write under t.TempDir().
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
